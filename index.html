<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trello Barcode Power-Up</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 16px; background: #ffffff; color: #172b4d; }
    .wrap { max-width: 420px; margin: 0 auto; text-align: center; }
    h2 { margin: 0 0 12px; font-size: 20px; }
    .meta { margin: 8px 0 14px; color: #44546f; font-size: 14px; word-break: break-word; }
    .box { border: 1px solid #dfe1e6; border-radius: 8px; padding: 14px; background: #fff; }
    #barcode { width: 100%; height: auto; margin: 8px 0 12px; }
    .payload { font-family: monospace; font-size: 12px; color: #44546f; word-break: break-all; margin-top: 8px; }
    .buttons { display: flex; gap: 10px; justify-content: center; margin-top: 14px; flex-wrap: wrap; }
    button { border: 0; border-radius: 6px; padding: 10px 14px; cursor: pointer; font-size: 14px; }
    .primary { background: #0c66e4; color: white; }
    .secondary { background: #f1f2f4; color: #172b4d; }
    @media print { .buttons { display: none; } body { margin: 0; } .box { border: 0; padding: 0; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="box">
      <h2 id="title">Barcode</h2>
      <div class="meta" id="nameLine">Loading…</div>
      <svg id="barcode"></svg>
      <div class="payload" id="payload"></div>
      <div class="buttons">
        <button class="primary" id="printBtn">Print</button>
        <button class="secondary" id="closeBtn">Close</button>
      </div>
    </div>
  </div>

  <script>
    const t = window.TrelloPowerUp.iframe();

    function qs(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function renderBarcode(text) {
      JsBarcode("#barcode", text, {
        format: "CODE128",
        width: 2,
        height: 80,
        displayValue: true,
        margin: 10
      });
      document.getElementById("payload").textContent = text;
      try { t.sizeTo(document.body); } catch (e) {}
    }

    async function init() {
      const mode = qs("mode");

      if (mode === "card") {
        const card = await t.card("id", "name");
        document.getElementById("title").textContent = "Card Barcode";
        document.getElementById("nameLine").textContent = card.name || "Unnamed card";
        renderBarcode("CARD_" + card.id);
      } else if (mode === "list") {
        const list = await t.list("id", "name");
        document.getElementById("title").textContent = "List Barcode";
        document.getElementById("nameLine").textContent = list.name || "Unnamed list";
        renderBarcode("LIST_" + list.id);
      } else {
        document.getElementById("title").textContent = "Barcode";
        document.getElementById("nameLine").textContent = "Missing mode parameter";
        document.getElementById("payload").textContent = "Use ?mode=card or ?mode=list";
      }
      try { t.sizeTo(document.body); } catch (e) {}
    }

    document.getElementById("printBtn").addEventListener("click", () => window.print());
    document.getElementById("closeBtn").addEventListener("click", () => t.closePopup());

    init();
  </script>
</body>
</html>
