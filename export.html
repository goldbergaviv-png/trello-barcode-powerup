<!doctype html>
<html><head><meta charset="utf-8"><title>Scanner Tools</title>
<script src="https://p.trellocdn.com/power-up.min.js"></script>
<style>body{font-family:Arial,Helvetica,sans-serif;margin:16px;color:#172b4d}.card{border:1px solid #dfe1e6;border-radius:12px;padding:14px;background:#fff}h2{margin:0 0 12px;font-size:20px}p{margin:8px 0;line-height:1.35}button{border:0;border-radius:8px;padding:10px 14px;background:#0c66e4;color:#fff;cursor:pointer;font-size:14px}.muted{color:#44546f;font-size:13px}code{background:#f1f2f4;padding:2px 5px;border-radius:5px;word-break:break-all}</style>
</head><body><div class="card"><h2>Scanner Tools</h2><p id="boardInfo">Loading board…</p><p class="muted">Download a mapping file for this board, then open the scanner page on your phone and load the file there.</p><p><button id="downloadBtn">Download board mapping JSON</button></p><p class="muted">Phone scanner link:</p><p><code id="scannerLink"></code></p></div>
<script>
const t=window.TrelloPowerUp.iframe();
async function getBoardData(){let data=await t.get('board','shared','barcodeMap')||{};if(!data.boardCode){let c=await t.get('organization','shared','boardCounter')||0;c++;await t.set('organization','shared','boardCounter',c);data.boardCode="B"+String(c).padStart(2,"0");data.cardCounter=0;data.listCounter=0;data.cards={};data.lists={};await t.set('board','shared','barcodeMap',data)}data.cardCounter=data.cardCounter||0;data.listCounter=data.listCounter||0;data.cards=data.cards||{};data.lists=data.lists||{};return data}
async function getListCode(id){const d=await getBoardData();if(!d.lists[id]){d.listCounter++;const bb=d.boardCode.substring(1);const n=String(d.listCounter).padStart(2,"0");d.lists[id]="L"+bb+n;await t.set('board','shared','barcodeMap',d)}return d.lists[id]}
async function getCardCode(id){const d=await getBoardData();if(!d.cards[id]){d.cardCounter++;const bb=d.boardCode.substring(1);const n=String(d.cardCounter).padStart(5,"0");d.cards[id]="C"+bb+n;await t.set('board','shared','barcodeMap',d)}return d.cards[id]}
function downloadJson(filename,obj){const blob=new Blob([JSON.stringify(obj,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
async function init(){const board=await t.board('id','name');document.getElementById('boardInfo').textContent='Board: '+board.name;document.getElementById('scannerLink').textContent=new URL('./scanner.html?v=9',window.location.href).href;document.getElementById('downloadBtn').addEventListener('click',async()=>{const lists=await t.lists('id','name');const cards=await t.cards('id','name');const map=await getBoardData();const out={version:1,exportedAt:new Date().toISOString(),board:{id:board.id,name:board.name,code:map.boardCode},lists:{},cards:{}};for(const list of lists){const code=await getListCode(list.id);out.lists[code]={id:list.id,name:list.name,boardCode:map.boardCode}}for(const card of cards){const code=await getCardCode(card.id);out.cards[code]={id:card.id,name:card.name,boardCode:map.boardCode}}const safe=(board.name||'board').replace(/[^a-z0-9-_]+/gi,'_');downloadJson('scanner_mapping_'+safe+'.json',out)});try{t.sizeTo(document.body)}catch(e){}}
init();
</script></body></html>
