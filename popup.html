<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Trello Barcode Label</title>
<script src="https://p.trellocdn.com/power-up.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<style>
@page { size: 60mm 90mm; margin: 0; }
* { box-sizing: border-box; }
body{ margin:0; padding:8px; font-family:Arial, Helvetica, sans-serif; background:#f4f5f7; }
#toolbar{ position:sticky; top:0; background:#f4f5f7; text-align:center; padding:8px 0 12px 0; z-index:10; }
.btn{ border:0; border-radius:8px; padding:10px 16px; font-size:14px; cursor:pointer; margin:0 6px; }
.btn-primary{ background:#0c66e4; color:white; }
.btn-secondary{ background:#dfe1e6; color:#172b4d; }
#container{ display:flex; flex-direction:column; align-items:center; gap:10px; }
.label{ width:60mm; height:90mm; padding:3mm; display:flex; flex-direction:column; align-items:center; background:white; color:black; overflow:hidden; border:1px solid #ddd; page-break-after:always; break-after:page; }
.logo{ width:54mm; max-width:54mm; height:12mm; object-fit:contain; display:block; margin-bottom:2mm; }
.row{ width:100%; display:flex; justify-content:space-between; align-items:flex-start; gap:2mm; font-weight:bold; font-size:10pt; margin-bottom:2mm; }
.name{ flex:1 1 auto; min-width:0; line-height:1.1; max-height:8mm; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; word-break:break-word; }
.due{ flex:0 0 auto; white-space:nowrap; text-align:right; }
.cover{ width:54mm; height:32mm; object-fit:contain; display:block; margin-bottom:2mm; border:1px solid #ddd; }
.commentsTitle{ font-size:9pt; font-weight:bold; width:100%; margin-bottom:0.5mm; }
.comment{ font-size:8pt; width:100%; line-height:1.15; min-height:3.6mm; max-height:3.6mm; overflow:hidden; white-space:normal; word-break:break-word; }
.barcode{ margin-top:auto; text-align:center; width:100%; }
.barcode svg{ width:50mm; height:14mm; display:block; margin:0 auto; }
.code{ font-weight:bold; font-size:11pt; margin-top:1mm; }
.listTitle{ font-size:16pt; font-weight:bold; margin-top:8mm; text-align:center; width:100%; line-height:1.15; word-break:break-word; }
.error{ padding:20px; font-size:14px; color:#b42318; background:#fff; border:1px solid #f0c5c5; border-radius:8px; }
@media print{
  body{ background:white; padding:0; }
  #toolbar{ display:none; }
  #container{ gap:0; }
  .label{ border:0; }
}
</style>
</head>
<body>

<div id="toolbar">
  <button class="btn btn-primary" onclick="window.print()">Print</button>
  <button class="btn btn-secondary" onclick="window.close()">Close</button>
</div>

<div id="container"></div>

<script>
const t = window.TrelloPowerUp.iframe();

function qs(n){ return new URLSearchParams(window.location.search).get(n); }
function formatDue(d){
  if(!d) return "";
  const x = new Date(d);
  if (isNaN(x.getTime())) return "";
  return String(x.getDate()).padStart(2,"0") + " " + x.toLocaleString('en',{month:'short'});
}
function renderBarcode(svg,text){
  JsBarcode(svg,text,{format:"CODE128",width:1.5,height:40,displayValue:false,margin:0});
}
async function getBoardData(){
  let data = await t.get('board','shared','barcodeMap') || {};
  if(!data.boardCode){
    let counter = await t.get('organization','shared','boardCounter') || 0;
    counter++;
    await t.set('organization','shared','boardCounter',counter);
    data.boardCode = "B" + String(counter).padStart(2,"0");
    data.cardCounter = 0;
    data.listCounter = 0;
    data.cards = {};
    data.lists = {};
    await t.set('board','shared','barcodeMap',data);
  }
  data.cardCounter = data.cardCounter || 0;
  data.listCounter = data.listCounter || 0;
  data.cards = data.cards || {};
  data.lists = data.lists || {};
  return data;
}
async function getCardCode(id){
  let data = await getBoardData();
  if(!data.cards[id]){
    data.cardCounter++;
    const bb = data.boardCode.substring(1);
    const num = String(data.cardCounter).padStart(5,"0");
    data.cards[id] = "C" + bb + num;
    await t.set('board','shared','barcodeMap',data);
  }
  return data.cards[id];
}
async function getListCode(id){
  let data = await getBoardData();
  if(!data.lists[id]){
    data.listCounter++;
    const bb = data.boardCode.substring(1);
    const num = String(data.listCounter).padStart(2,"0");
    data.lists[id] = "L" + bb + num;
    await t.set('board','shared','barcodeMap',data);
  }
  return data.lists[id];
}
function firstLines(desc){
  const raw = (desc || '').replace(/\r/g,'');
  const lines = raw.split('\n').map(x => x.trim()).filter(x => x.length > 0);
  return [lines[0] || "", lines[1] || ""];
}
function createLabel(){
  const d = document.createElement("div");
  d.className = "label";
  return d;
}
function addLogo(label){
  const logo = document.createElement("img");
  logo.src = "./logo.jpeg?v=8";
  logo.className = "logo";
  label.appendChild(logo);
}
function appendBarcode(label, code){
  const bc = document.createElement("div");
  bc.className = "barcode";
  const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
  bc.appendChild(svg);
  const txt = document.createElement("div");
  txt.className = "code";
  txt.innerText = code;
  bc.appendChild(txt);
  label.appendChild(bc);
  renderBarcode(svg,code);
}
function addError(text){
  const err = document.createElement("div");
  err.className = "error";
  err.innerText = text;
  document.getElementById("container").appendChild(err);
}
async function init(){
  const mode = qs("mode");
  const container = document.getElementById("container");

  if(mode === "card"){
    const card = await t.card("id","name","due","desc","cover","attachments");
    const code = await getCardCode(card.id);
    const label = createLabel();
    addLogo(label);

    const row = document.createElement("div");
    row.className = "row";
    const name = document.createElement("div");
    name.className = "name";
    name.innerText = card.name || "";
    const due = document.createElement("div");
    due.className = "due";
    due.innerText = formatDue(card.due);
    row.appendChild(name);
    row.appendChild(due);
    label.appendChild(row);

    const coverUrl = (card.cover && card.cover.url) ? card.cover.url : "";
    if(coverUrl){
      const img = document.createElement("img");
      img.src = coverUrl;
      img.className = "cover";
      label.appendChild(img);
    } else {
      const ph = document.createElement("div");
      ph.className = "cover";
      ph.style.display = "flex";
      ph.style.alignItems = "center";
      ph.style.justifyContent = "center";
      ph.style.fontSize = "9pt";
      ph.style.color = "#666";
      ph.innerText = "No cover image";
      label.appendChild(ph);
    }

    const title = document.createElement("div");
    title.className = "commentsTitle";
    title.innerText = "Comments:";
    label.appendChild(title);

    const [l1,l2] = firstLines(card.desc);
    const c1 = document.createElement("div");
    c1.className = "comment";
    c1.innerText = l1;
    label.appendChild(c1);
    const c2 = document.createElement("div");
    c2.className = "comment";
    c2.innerText = l2;
    label.appendChild(c2);

    appendBarcode(label, code);
    container.appendChild(label);
  }

  if(mode === "list"){
    const listId = qs("listId");
    const listName = qs("listName") || "";
    if (!listId) {
      addError("Missing list data.");
    } else {
      const code = await getListCode(listId);
      const label = createLabel();
      addLogo(label);

      const title = document.createElement("div");
      title.className = "listTitle";
      title.innerText = listName;
      label.appendChild(title);

      const spacer = document.createElement("div");
      spacer.style.flex = "1 1 auto";
      label.appendChild(spacer);

      appendBarcode(label, code);
      container.appendChild(label);
    }
  }

  if(mode === "allcards"){
    const cards = await t.cards("id","name","due","desc","cover","attachments");
    for (const card of cards){
      const code = await getCardCode(card.id);
      const label = createLabel();
      addLogo(label);

      const row = document.createElement("div");
      row.className = "row";
      const name = document.createElement("div");
      name.className = "name";
      name.innerText = card.name || "";
      const due = document.createElement("div");
      due.className = "due";
      due.innerText = formatDue(card.due);
      row.appendChild(name);
      row.appendChild(due);
      label.appendChild(row);

      const coverUrl = (card.cover && card.cover.url) ? card.cover.url : "";
      if(coverUrl){
        const img = document.createElement("img");
        img.src = coverUrl;
        img.className = "cover";
        label.appendChild(img);
      } else {
        const ph = document.createElement("div");
        ph.className = "cover";
        ph.style.display = "flex";
        ph.style.alignItems = "center";
        ph.style.justifyContent = "center";
        ph.style.fontSize = "9pt";
        ph.style.color = "#666";
        ph.innerText = "No cover image";
        label.appendChild(ph);
      }

      const title = document.createElement("div");
      title.className = "commentsTitle";
      title.innerText = "Comments:";
      label.appendChild(title);

      const [l1,l2] = firstLines(card.desc);
      const c1 = document.createElement("div");
      c1.className = "comment";
      c1.innerText = l1;
      label.appendChild(c1);
      const c2 = document.createElement("div");
      c2.className = "comment";
      c2.innerText = l2;
      label.appendChild(c2);

      appendBarcode(label, code);
      container.appendChild(label);
    }
  }

  try { t.sizeTo(document.body); } catch(e) {}
}
init();
</script>

</body>
</html>
