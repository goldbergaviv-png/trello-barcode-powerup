<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Trello Barcode Label</title>
<script src="https://p.trellocdn.com/power-up.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

<style>

@page {
  size: 60mm 90mm;
  margin:0;
}

body{
  margin:0;
  font-family:Arial;
}

.label{
  width:60mm;
  height:90mm;
  padding:3mm;
  box-sizing:border-box;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.logo{
  height:12mm;
  margin-bottom:2mm;
}

.row{
  width:100%;
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  font-size:11pt;
}

.cover{
  width:100%;
  height:32mm;
  object-fit:contain;
  margin-top:2mm;
  margin-bottom:2mm;
}

.commentsTitle{
  font-size:9pt;
  font-weight:bold;
  width:100%;
}

.comment{
  font-size:8pt;
  width:100%;
}

.barcode{
  margin-top:auto;
  text-align:center;
}

.barcode svg{
  width:50mm;
  height:14mm;
}

.code{
  font-weight:bold;
  font-size:11pt;
}

</style>
</head>

<body>

<div id="container"></div>

<script>

const t = window.TrelloPowerUp.iframe()

function qs(n){return new URLSearchParams(window.location.search).get(n)}

function formatDue(d){
 if(!d) return ""
 const x=new Date(d)
 return x.getDate()+" "+x.toLocaleString('en',{month:'short'})
}

function renderBarcode(svg,text){
 JsBarcode(svg,text,{format:"CODE128",width:1.5,height:40,displayValue:false})
}

async function getBoardData(){

 let data = await t.get('board','shared','barcodeMap') || {}

 if(!data.boardCode){

   let counter = await t.get('organization','shared','boardCounter') || 0
   counter++
   await t.set('organization','shared','boardCounter',counter)

   data.boardCode="B"+String(counter).padStart(2,"0")
   data.cardCounter=0
   data.listCounter=0
   data.cards={}
   data.lists={}

   await t.set('board','shared','barcodeMap',data)
 }

 return data
}

async function getCardCode(id){

 let data = await getBoardData()

 if(!data.cards[id]){
   data.cardCounter++
   const bb=data.boardCode.substring(1)
   const num=String(data.cardCounter).padStart(5,"0")
   data.cards[id]="C"+bb+num
   await t.set('board','shared','barcodeMap',data)
 }

 return data.cards[id]
}

async function getListCode(id){

 let data = await getBoardData()

 if(!data.lists[id]){
   data.listCounter++
   const bb=data.boardCode.substring(1)
   const num=String(data.listCounter).padStart(2,"0")
   data.lists[id]="L"+bb+num
   await t.set('board','shared','barcodeMap',data)
 }

 return data.lists[id]
}

function firstLines(desc){
 const lines=(desc||"").split("\n")
 return [lines[0]||"",lines[1]||""]
}

function createLabel(){
 const d=document.createElement("div")
 d.className="label"
 return d
}

async function init(){

 const mode=qs("mode")
 const container=document.getElementById("container")

 if(mode==="card"){

   const card=await t.card("id","name","due","desc","cover")
   const code=await getCardCode(card.id)

   const label=createLabel()

   const logo=document.createElement("img")
   logo.src="./logo.jpeg"
   logo.className="logo"
   label.appendChild(logo)

   const row=document.createElement("div")
   row.className="row"
   row.innerHTML="<div>"+card.name+"</div><div>"+formatDue(card.due)+"</div>"
   label.appendChild(row)

   if(card.cover && card.cover.url){
     const img=document.createElement("img")
     img.src=card.cover.url
     img.className="cover"
     label.appendChild(img)
   }

   const title=document.createElement("div")
   title.className="commentsTitle"
   title.innerText="Comments:"
   label.appendChild(title)

   const [l1,l2]=firstLines(card.desc)

   const c1=document.createElement("div")
   c1.className="comment"
   c1.innerText=l1
   label.appendChild(c1)

   const c2=document.createElement("div")
   c2.className="comment"
   c2.innerText=l2
   label.appendChild(c2)

   const bc=document.createElement("div")
   bc.className="barcode"

   const svg=document.createElementNS("http://www.w3.org/2000/svg","svg")
   bc.appendChild(svg)

   const txt=document.createElement("div")
   txt.className="code"
   txt.innerText=code
   bc.appendChild(txt)

   label.appendChild(bc)

   container.appendChild(label)

   renderBarcode(svg,code)
 }

 if(mode==="list"){

   const list=await t.list("id","name")
   const code=await getListCode(list.id)

   const label=createLabel()

   const logo=document.createElement("img")
   logo.src="./logo.jpeg"
   logo.className="logo"
   label.appendChild(logo)

   const title=document.createElement("div")
   title.style.fontSize="16pt"
   title.style.fontWeight="bold"
   title.style.marginTop="8mm"
   title.innerText=list.name
   label.appendChild(title)

   const bc=document.createElement("div")
   bc.className="barcode"

   const svg=document.createElementNS("http://www.w3.org/2000/svg","svg")
   bc.appendChild(svg)

   const txt=document.createElement("div")
   txt.className="code"
   txt.innerText=code
   bc.appendChild(txt)

   label.appendChild(bc)

   container.appendChild(label)

   renderBarcode(svg,code)
 }

}

init()

</script>

</body>
</html>
