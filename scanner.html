<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Move Card</title>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <script src="./scanner-config.js?v=12"></script>
  <script src="./scanner.js?v=12" defer></script>
  <style>
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#0f172a;color:#e5e7eb;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .wrap{width:min(92vw,460px);text-align:center}
    .panel{background:#111827;border-radius:20px;padding:22px 18px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
    .title{font-size:30px;font-weight:700;margin-bottom:10px}
    .subtitle{color:#94a3b8;font-size:14px;min-height:20px;margin-bottom:16px}
    .big-btn{width:100%;border:0;border-radius:16px;padding:18px 20px;font-size:28px;font-weight:700;background:#2563eb;color:white;cursor:pointer}
    .state{font-size:28px;font-weight:700;margin:10px 0 6px}
    .hint{font-size:15px;color:#cbd5e1;min-height:22px;margin-bottom:12px}
    .value{font-size:20px;font-weight:700;color:#f8fafc;word-break:break-word;min-height:28px;margin-bottom:8px}
    #reader{width:100%;overflow:hidden;border-radius:14px;margin-top:10px}
    .hidden{display:none}.ok{color:#4ade80}.warn{color:#fbbf24}.err{color:#f87171}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div id="homeScreen">
        <div class="title">Move Card</div>
        <div class="subtitle" id="homeStatus">Ready</div>
        <button class="big-btn" id="moveBtn">Move Card</button>
      </div>
      <div id="scanScreen" class="hidden">
        <div class="state" id="stateText">Scan Card</div>
        <div class="hint" id="hintText">Point the camera at a card QR</div>
        <div class="value" id="scanValue"></div>
        <div id="reader"></div>
      </div>
      <div id="doneScreen" class="hidden">
        <div class="state ok">DONE</div>
        <div class="hint" id="doneText"></div>
      </div>
      <div id="errorScreen" class="hidden">
        <div class="state err">ERROR</div>
        <div class="hint" id="errorText"></div>
        <button class="big-btn" id="backBtn" style="font-size:22px;margin-top:10px;">Back</button>
      </div>
    </div>
  </div>
</body>
</html>
